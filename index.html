<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loan Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">Telecel</div>
    <button class="menu-btn">☰</button>
  </header>

  <main class="container">
    <h1>Get Your Loan Approved Fast</h1>
    <p class="subtitle">Quick approval • competitive rates • flexible repayment</p>

    <div class="card">
      <h2>Loan Calculator</h2>

      <div class="field">
        <label>Loan Amount</label>
        <input type="range" id="amount" min="100" max="5000" value="1000">
        <div class="value">GHS <span id="amountValue">1,000</span></div>
      </div>

      <div class="field">
        <label>Loan Term</label>
        <input type="range" id="months" min="1" max="24" value="12">
        <div class="value"><span id="monthValue">12</span> months</div>
      </div>

      <div class="payment-box">
        <p>Monthly Payment</p>
        <h3>GHS <span id="payment">95.33</span></h3>
      </div>

      <button class="apply-btn">Apply Now</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
